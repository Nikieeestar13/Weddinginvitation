<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Wedding Invitation</title>
    <style>
        :root {
            --envelope-color: #fcfbf7;
            --flap-color: #f5f3ed;
            --accent: #c5a059;
            --transition-speed: 2.2s; 
            --easing: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            background-color: #d1d1d1; 
            font-family: 'Georgia', serif; 
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent;
        }

        .stage { 
            width: 100vw; 
            height: 100vh;
            perspective: 1500px; 
            position: relative;
            background: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .envelope-full {
            position: relative; 
            /* 20% Padding effect: Width 80% and Height 80% */
            width: 80%; 
            height: 70%;
            background-color: var(--envelope-color);
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            display: flex; justify-content: center; align-items: center;
            z-index: 10; 
            transform-style: preserve-3d;
            transition: all 1s var(--easing); /* Smoothly expand to full screen */
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        /* Expand envelope to full screen when opened */
        .envelope-full.open {
            width: 100%;
            height: 100%;
            box-shadow: none;
        }
	  /*location button*/
.wedding-button {
    background-color: #f4f1ea; /* Soft Cream */
    color: #5d5d5d; /* Elegant Grey */
    padding: 12px 28px;
    text-decoration: none;
    font-family: 'Times New Roman', serif;
    border: 1px solid #d4af37; /* Gold Border */
    border-radius: 2px;
    display: inline-block;
    transition: all 0.3s ease;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-size: 14px;
  }

  .wedding-button:hover {
    background-color: #d4af37;
    color: white;
  }

        .flap {
            position: absolute; 
            top: 0; 
            width: 100%; 
            height: 50%; 
            background-image: url('envelopetop.jpg'); 
            background-color: var(--flap-color);
            background-size: cover;
            background-position: center;
            clip-path: polygon(0% 0%, 100% 0%, 100% 10%, 50% 100%, 0% 10%);
            transform-origin: top; 
            transition: transform var(--transition-speed) var(--easing);
            z-index: 15;
            filter: drop-shadow(0 8px 10px rgba(0,0,0,0.15));
        }

        .emblem {
            position: absolute; 
            /* Centered relative to the flap point */
            top: calc(50% - 75px); 
            width: 150px; 
            height: 150px;
            background-image: url('mp.png'); 
            background-repeat: no-repeat;
            background-position: center; 
            background-size: contain;
            z-index: 20; 
            transition: all 0.8s var(--easing); 
            transform: translateZ(35px); 
            cursor: pointer;
        }

        .invite-card {
            width: 100%; height: 100%; 
            background: #fffcf6;
            opacity: 0; 
            position: absolute; top: 0; left: 0; 
            z-index: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            transition: opacity 1s ease 0.8s;
        }

        .scroll-content {
            padding: 40px 25px 100px;
            display: flex; flex-direction: column; align-items: center;
        }

        .details { text-align: center; min-height: 80vh; display: flex; flex-direction: column; justify-content: center; }
        .details h1 { color: var(--accent); font-size: 36px; margin: 15px 0; }
        .details p { font-size: 13px; letter-spacing: 2px; color: #666; text-transform: uppercase; }

        .rsvp-section {
            width: 100%; max-width: 320px;
            padding: 10px; border: 1px solid #f0eee9;
            background: #fff; margin-top: 20px;
        }

        /* Open Animations */
        .open .flap { transform: rotateX(155deg); z-index: 5; }
        .open .emblem { opacity: 0; transform: translateY(-40px) scale(0.5); pointer-events: none; }
        .open .invite-card { opacity: 1; z-index: 25; }

        .flower { position: fixed; top: -50px; z-index: 99; pointer-events: none; color: #c1a37f; }
        @keyframes fall { 
            0% { transform: translateY(0) rotate(0deg); opacity: 0; } 
            10% { opacity: 1; } 
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } 
        }
    </style>
</head>
<body>

    <div class="stage">
        <div class="envelope-full" id="envelope" onclick="openInvite()" ontouchstart="openInvite()">
            <div class="flap"></div>
            <div class="emblem"></div>
            
            <div class="invite-card" id="card">
                <div class="scroll-content">
                    <div class="details">
                        <p>Join us for the wedding of</p>
			<p><img src="card face.png" style="width: 80%; margin-top: 10px;"></p>
			<p><img src="date.png" style="width: 80%;"></p>
                        <p><img src="QR.png" style="width: 30%; "></p>
			<p><a href="https://maps.app.goo.gl/sxFPXouoKX6Tcn4J7" class="wedding-button">View Map and Directions</a></p>
                        
			<p><img src="flowers.png" style="width: 80%; "></p><br><br>
			<h1 style="text-align: center; color: var(--accent); font-weight: normal;">RECEPTION</h1>
			<p><img src="reception.png" style="width: 80%; "></p>
			<p><a href="https://maps.app.goo.gl/w5xf9HBfStfvVQBJ6" class="wedding-button">View Map and Directions to Venue</a></p>
			

			<p><br><br><img src="flowers2.png" style="width: 80%; "></p>
                        <div style="margin-top: 40px; color: var(--accent); animation: bounce 2s infinite;">↓</div>
                        <p style="font-size: 9px; margin-top: 10px;">SCROLL TO RSVP</p>
                    </div>
                   
                    <div class="rsvp-section">
                        <h2 style="text-align: center; color: var(--accent); font-weight: normal;">RSVP</h2>
                         <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeHRSsmXvwDdFQqRgz-Df66g6Gm9XBZ9-TXUd8YMmH3Kw6vrQ/viewform?embedded=true" width="100%" height="1000px" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
                        <div id="done-msg" style="display:none; text-align: center; padding: 20px;">
                            <p style="color: var(--accent);">Response Sent!</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openInvite() {
            const env = document.getElementById('envelope');
            if (!env.classList.contains('open')) {
                env.classList.add('open');
                startPetals();
            }
        }

        function startPetals() {
            const chars = ['✿', '❀', '❃']; 
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const f = document.createElement('div');
                    f.className = 'flower';
                    f.innerText = chars[Math.floor(Math.random() * chars.length)];
                    f.style.left = Math.random() * 100 + 'vw';
                    f.style.fontSize = (15 + Math.random() * 15) + 'px';
                    f.style.animation = `fall ${4 + Math.random() * 5}s linear forwards`;
                    document.body.appendChild(f);
                    setTimeout(() => f.remove(), 9000);
                }, i * 160);
            }
        }

        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
