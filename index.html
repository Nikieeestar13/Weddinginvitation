<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Wedding Invitation</title>
    <style>
        :root {
            --envelope-color: #fcfbf7;
            --flap-color: #f5f3ed;
            --accent: #c5a059;
            --transition-speed: 2.2s; 
            --easing: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            background-color: #d1d1d1; 
            font-family: 'Georgia', serif; 
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent;
        }

        .stage { 
            width: 100vw; 
            height: 100vh; 
            perspective: 1500px; 
            position: relative;
            background: #e0e0e0;
        }

        .envelope-full {
            position: absolute; 
            width: 100%; height: 100%;
            background-color: var(--envelope-color);
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            display: flex; justify-content: center; align-items: center;
            z-index: 10; transform-style: preserve-3d;
        }

        /* Deep Flap Adjustment */
        .flap {
            position: absolute; 
            top: 0; 
            width: 100%; 
            /* Flap now comes down to 50% of the screen height */
            height: 50vh; 
            background-image: url('envelopetop.jpg'); 
            background-color: var(--flap-color);
            background-size: cover;
            background-position: center;
            
            /* Deep V-shape: points exactly to the center (50%, 100%) */
            clip-path: polygon(0% 0%, 120% 0%, 120% 20%, 50% 120%, 0% 50%);
            
            transform-origin: top; 
            transition: transform var(--transition-speed) var(--easing);
            z-index: 15;
            filter: drop-shadow(0 8px 10px rgba(0,0,0,0.15));
        }

        /* Emblem positioned at the tip of the deep V */
        .emblem {
            position: absolute; 
            top: 42vh; /* Adjusted to sit naturally on the deep point */
            width: 150px; 
            height: 150px;
            background-image: url('mp.png'); 
            background-repeat: no-repeat;
            background-position: center; 
            background-size: contain;
            z-index: 20; 
            transition: all 0.8s var(--easing); 
            transform: translateZ(35px); 
            cursor: pointer;
        }

        /* Internal Scrollable Card */
        .invite-card {
            width: 100%; height: 100%; 
            background: white;
            opacity: 0; 
            position: absolute; top: 0; left: 0; 
            z-index: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            transition: opacity 1s ease 0.8s;
        }

        .scroll-content {
            padding: 40px 25px 100px;
            display: flex; flex-direction: column; align-items: center;
        }

        .details { text-align: center; min-height: 80vh; display: flex; flex-direction: column; justify-content: center; }
        .details h1 { color: var(--accent); font-size: 36px; margin: 15px 0; }
        .details p { font-size: 13px; letter-spacing: 2px; color: #666; text-transform: uppercase; }

        /* RSVP Form */
        .rsvp-section {
            width: 100%; max-width: 320px;
            padding: 30px; border: 1px solid #f0eee9;
            background: #fff; margin-top: 20px;
        }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 10px; color: var(--accent); margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }

        .submit-btn { 
            width: 100%; padding: 16px; background: var(--accent); color: white; 
            border: none; letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
        }

        /* Open Animations */
        .open .flap { transform: rotateX(155deg); z-index: 5; }
        .open .emblem { opacity: 0; transform: translateY(-40px) scale(0.5); pointer-events: none; }
        .open .invite-card { opacity: 1; z-index: 25; }

        /* Confetti */
        .flower { position: fixed; top: -50px; z-index: 99; pointer-events: none; color: #c1a37f; }
        @keyframes fall { 
            0% { transform: translateY(0) rotate(0deg); opacity: 0; } 
            10% { opacity: 1; } 
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } 
        }
    </style>
</head>
<body>

    <div class="stage">
        <div class="envelope-full" id="envelope" onclick="openInvite()" ontouchstart="openInvite()">
            <div class="flap"></div>
            
            <div class="emblem"></div>
            
            <div class="invite-card" id="card">
                <div class="scroll-content">
                    <div class="details">
                        <p>Join us for the wedding of</p>
                        <h1>Sarah & James</h1>
                        <p>October 24, 2026</p>
                        <p>California</p>
                        <div style="margin-top: 40px; color: var(--accent); animation: bounce 2s infinite;">↓</div>
                        <p style="font-size: 9px; margin-top: 10px;">SCROLL TO RSVP</p>
                    </div>

                    <div class="rsvp-section">
                        <h2 style="text-align: center; color: var(--accent); font-weight: normal;">RSVP</h2>
                        <div id="form-body">
                            <div class="form-group">
                                <label>FULL NAME</label>
                                <input type="text">
                            </div>
                            <div class="form-group">
                                <label>PHONE NUMBER</label>
                                <input type="tel">
                            </div>
                            <div class="form-group">
                                <label>ATTENDING?</label>
                                <div style="display: flex; gap: 20px; font-size: 14px; margin-top: 10px;">
                                    <label><input type="radio" name="r"> YES</label>
                                    <label><input type="radio" name="r"> NO</label>
                                </div>
                            </div>
                            <button class="submit-btn" onclick="done()">Submit</button>
                        </div>
                        <div id="done-msg" style="display:none; text-align: center; padding: 20px;">
                            <p style="color: var(--accent);">Response Sent!</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openInvite() {
            const env = document.getElementById('envelope');
            if (!env.classList.contains('open')) {
                env.classList.add('open');
                startPetals();
            }
        }

        function done() {
            document.getElementById('form-body').style.display = 'none';
            document.getElementById('done-msg').style.display = 'block';
        }

        function startPetals() {
            const chars = ['✿', '❀', '❃']; 
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const f = document.createElement('div');
                    f.className = 'flower';
                    f.innerText = chars[Math.floor(Math.random() * chars.length)];
                    f.style.left = Math.random() * 100 + 'vw';
                    f.style.fontSize = (15 + Math.random() * 15) + 'px';
                    f.style.animation = `fall ${4 + Math.random() * 5}s linear forwards`;
                    document.body.appendChild(f);
                    setTimeout(() => f.remove(), 9000);
                }, i * 160);
            }
        }

        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
