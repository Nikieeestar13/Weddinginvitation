<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Wedding</title>
    <style>
        :root {
            --envelope-color: #fcfbf7;
            --flap-color: #f5f3ed;
            --accent: #c5a059;
            --transition-speed: 2.5s; 
            --easing: cubic-bezier(0.45, 0.05, 0.55, 0.95);
            --lace-pattern: radial-gradient(circle at center, rgba(0,0,0,0.03) 1px, transparent 1px), 
                            radial-gradient(circle at center, rgba(0,0,0,0.02) 4px, transparent 5px);
        }

        /* Basic Reset */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #d1d1d1;
            font-family: 'Georgia', serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Perspective wrapper for mobile 3D */
        .stage {
            width: 100vw;
            height: 100vh;
            perspective: 1200px;
            overflow: hidden;
        }

        .envelope-full {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--envelope-color);
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transform-style: preserve-3d;
            transition: transform 1.2s var(--easing);
        }

        /* The 3D Flap */
        .flap {
            position: absolute;
            top: 0;
            width: 100%;
            height: 50%;
            background-image: url('envelopetop.jpg');
            clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
            transform-origin: top;
            transform: rotateX(0deg);
            transition: transform var(--transition-speed) var(--easing);
            z-index: 5;
            -webkit-tap-highlight-color: transparent;
        }


        /* The Emblem */
        .emblem {
            position: absolute;
            width: 200px;
            height: 200px;
            background-image: url('mp.png');
 	    background-repeat: no-repeat;
 	    background-position: center;
 	    background-size: contain;
            border-radius: 50%;

            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            z-index: 6;
            transition: all 1s var(--easing);
            transform: translateZ(25px); 
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* Container for the PDF */
        .invite-card {
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            transition: opacity 1.5s ease 1s; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Fallback button for mobile Safari */
        .mobile-fallback {
            position: absolute;
            bottom: 20px;
            padding: 15px 30px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
            z-index: 20;
            display: none;
        }

        /* Opening Animation */
        .open .flap {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .open .emblem {
            opacity: 0;
            transform: translateZ(100px) scale(0);
            pointer-events: none;
        }

        .open .invite-card {
            opacity: 1;
            z-index: 12;
        }

        /* Display fallback button only on small screens when opened */
        @media (max-width: 768px) {
            .open .mobile-fallback {
                display: block;
            }
        }

.flower {
    position: fixed;
    top: -50px;
    z-index: 99; /* Ensures they fall over the PDF */
    pointer-events: none; /* Guests can still click the PDF through the flowers */
    user-select: none;
    color: white; /* Pure white flowers */
    line-height: 1;
    filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
}

@keyframes fall {
    0% { 
        transform: translateY(0) rotate(0deg) translateX(0); 
        opacity: 0; 
    }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { 
        transform: translateY(110vh) rotate(450deg) translateX(50px); 
        opacity: 0; 
    }
}
    </style>
</head>
<body>

    <div class="stage">
        <div class="envelope-full" id="envelope" onclick="openInvite()" ontouchstart="openInvite()">
            <div class="flap"></div>
            <div class="emblem"></div>
            
            <div class="invite-card">
                <iframe src="invitation.pdf#toolbar=0&navpanes=0&view=FitH" type="application/pdf"></iframe>
                
                <a href="invitation.pdf" class="mobile-fallback" target="_blank">View Invitation Fullscreen</a>
            </div>
        </div>
    </div>

    <script>
        function openInvite() {
            const envelope = document.getElementById('envelope');
            if (!envelope.classList.contains('open')) {
                envelope.classList.add('open');
		startFlowerFall();
            }
        }

        // Prevent zoom on double tap for better mobile feel
        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

function startFlowerFall() {
    // You can call this container 'body' or '.stage'
    const container = document.body; 
    const flowerChars = ['✿', '❀', '❃', '✻', '✧']; // Various floral/petal shapes
    
    // Create 30 individual flowers
    for (let i = 0; i < 50; i++) {
        setTimeout(() => {
            const flower = document.createElement('div');
            flower.className = 'flower';
            
            // Pick a random floral character
            flower.innerText = flowerChars[Math.floor(Math.random() * flowerChars.length)];
            
            // Randomize appearance and physics
            const startX = Math.random() * 100; // Random horizontal start
            const duration = 5 + Math.random() * 5; // Fall speed between 5-10 seconds
            const size = 10 + Math.random() * 25; // Size between 10px and 35px
            const delay = Math.random() * 3; // Random start delay
            
            flower.style.left = startX + 'vw';
            flower.style.fontSize = size + 'px';
            flower.style.opacity = '0'; // Start invisible
            
            // Apply the animation
            flower.style.animation = `fall ${duration}s linear forwards`;
            
            container.appendChild(flower);
            
            // Cleanup: remove the element after it finishes falling to save memory
            setTimeout(() => {
                flower.remove();
            }, duration * 1000);
            
        }, i * 200); // Stagger the creation so they don't all drop at once
    }
}
    </script>
</body>
</html>
